      in variations); protect insertion of patellar tendon on tibia. Flex knee to
      90 degrees to gain exposure to entire knee joint. Proximal extension incises
      between rectus femoris and vastus medialis and may split vastus intermedius.'
    source_url: https://www.orthobullets.com/approaches/12028/knee-medial-parapatellar-approach
    source_section: Approach > Deep dissection
