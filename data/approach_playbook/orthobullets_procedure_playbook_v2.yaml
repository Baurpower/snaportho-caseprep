    source_url: https://www.orthobullets.com/approaches/12028/knee-medial-parapatellar-approach
    source_section: Approach > Deep dissection
    confidence: high
  approach_notes:
  - text: 'Standard medial parapatellar: most common primary TKA approach. Midline
      longitudinal incision (straight or curved), begin 5 cm above superior pole of
      patella to level of tibial tubercle. Develop medial skin flap. Perform medial
      parapatellar arthrotomy between rectus femoris/VM and patella. Retract or excise
      infrapatellar fat pad. Dislocate patella laterally, flex knee to 90 degrees
      for exposure. Protect patellar tendon insertion on tibia. If difficult eversion,
      extend proximally between rectus and vastus medialis (split vastus intermedius
