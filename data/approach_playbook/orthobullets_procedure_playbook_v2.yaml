    source_section: Introduction / Intermuscular Plane
    confidence: high
  - text: Superficial dissection develops medial skin flap to expose quadriceps tendon,
      medial border of the patella, and medial border of the patellar tendon. Medial
      parapatellar arthrotomy performed; infrapatellar fat pad is retracted or excised.
    source_url: https://www.orthobullets.com/approaches/12028/knee-medial-parapatellar-approach
    source_section: Approach > Superficial Dissection
    confidence: high
