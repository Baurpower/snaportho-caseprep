  important_anatomy:
  - text: 'Key intervals: posterior shares with Kocher-Langenbeck (gluteus maximus
      split, short ERs). Anterior: TFL/sartorius then rectus/gluteus medius. Lateral:
      no true internervous, splits abductors.'
