- procedure_id: distal_radius_fracture_orif
  display_name: Distal Radius Fracture ORIF
  specialty: trauma
  region: wrist
  orthobullets_urls:
  - https://www.orthobullets.com/trauma/1027/distal-radius-fractures
  - https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
  - https://www.orthobullets.com/approaches/12013/dorsal-approach-to-the-wrist
  recommended_approach_ids:
  - approach_wrist_volar_distal_henry
  conditional_approach_ids:
  - condition: dorsal fragment or dorsal plate or dorsal comminution or dorsal approach
      indicated
    triggers:
    - dorsal fragment
    - dorsal plate
    - dorsal comminution
    - dorsal approach
    - dorsal spanning
    approach_ids:
    - approach_wrist_dorsal
  blocked_approach_ids: []
  important_anatomy:
  - text: 'Distal radius responsible for 80% of axial load through wrist. Articulates
      with scaphoid via scaphoid fossa, lunate via lunate fossa, distal ulna via ulnar/sigmoid
      notch. Comprised of three columns: radial (radial styloid/scaphoid fossa; attachments
      for brachioradialis, long radiolunate, radioscaphocapitate ligaments), intermediate
      (lunate fossa), ulnar (TFCC and distal ulna for DRUJ stability and forearm rotation).'
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Anatomy > Osteology
    confidence: high
  - text: Lister's tubercle on dorsal surface ~1 cm proximal to articular surface;
      EPL tendon lies just ulnar to it before sharp turn into thumb. Important landmark
      to avoid EPL attritional rupture with long volar plate screws.
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Anatomy > Osteology
    confidence: high
  - text: 'Watershed line: most volar and prominent aspect of distal radius (lunate
      portion most prominent with short radiolunate ligament attachment). Critical
      region to remain proximal to for volar plate fixation to avoid FPL rupture.'
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Anatomy > Osteology
    confidence: high
  - text: Internervous plane in FCR approach between FCR (median n.) and FPL (AIN).
    source_url: https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
    source_section: Plane
    confidence: high
  structures_at_risk:
  - structure: Palmar cutaneous branch of median nerve
    why_it_matters: Arises 5 cm proximal to wrist joint; runs ulnar to FCR. Injury
      causes thenar numbness or neuroma.
    source_url: https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
    source_section: Dangers
    confidence: high
  - structure: Radial artery
    why_it_matters: Cannot ligate if poor ulnar contribution on Allen's test. At risk
      during retraction.
    source_url: https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
    source_section: Dangers
    confidence: high
  - structure: Volar wrist capsule ligaments
    why_it_matters: Do not remove from volar distal radius unless joint access needed;
      errant release leads to radiocarpal instability.
    source_url: https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
    source_section: Dangers
    confidence: high
  - structure: Posterior interosseous nerve (PIN)
    why_it_matters: At risk in Henry-type or dorsal approaches; protect with forearm
      position and subperiosteal dissection.
    source_url: https://www.orthobullets.com/approaches/12010/volar-approach-to-radius-henry
    source_section: Dangers
    confidence: high
  - structure: Superficial radial nerve
    why_it_matters: Vulnerable in superficial dissection; injury causes painful neuroma
      or sensory loss.
    source_url: https://www.orthobullets.com/approaches/12013/dorsal-approach-to-the-wrist
    source_section: Dangers
    confidence: high
  landmarks:
  - landmark: FCR tendon sheath
    why_it_matters: Primary landmark for volar incision and interval development.
    source_url: https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
    source_section: Approach > Incision
    confidence: high
  - landmark: Lister's tubercle
    why_it_matters: Dorsal landmark; guides EPL protection and dorsal approaches.
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Anatomy
    confidence: high
  - landmark: Radial styloid
    why_it_matters: Attachment for key ligaments; reference for radial column fixation.
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Anatomy
    confidence: high
  - landmark: Watershed line
    why_it_matters: Most volar prominence; stay proximal with volar plates to protect
      FPL.
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Anatomy
    confidence: high
  approach_notes:
  - text: 'Volar FCR approach: incision along FCR tendon sheath (ulnar/radial curve
      at crease), develop plane, retract FCR ulnarly, incise FCR sheath dorsally,
      retract FPL ulnarly, incise PQ borders and elevate. Proximal/distal extensions
      as needed for median n. or scaphoid.'
    source_url: https://www.orthobullets.com/approaches/12071/fcr-approach-to-distal-radius
    source_section: Approach
    confidence: high
  - text: Dorsal approach useful for displaced intra-articular dorsal lip fx or carpal
      work; no true internervous plane, between 3rd/4th extensor compartments.
    source_url: https://www.orthobullets.com/approaches/12013/dorsal-approach-to-the-wrist
    source_section: Approach
    confidence: high
  - text: Volar plating preferred; plate must not be placed distal to watershed line
      to avoid FPL irritation/rupture. Assess screw penetration with skyline and 23°
      elevated lateral views.
    source_url: https://www.orthobullets.com/trauma/1027/distal-radius-fractures
    source_section: Techniques > ORIF
    confidence: high
  pimp_topics:
  - What is the watershed line of the distal radius and why must volar plates remain
    proximal to it?
  - Which nerve branches are at risk in the FCR (volar) approach to the distal radius,
    and how do they run relative to the FCR?
  - Describe the three-column concept of the distal radius and the key ligament attachments
    of the radial column.
  - What is Lister's tubercle and its relationship to the EPL tendon? Clinical relevance
    for volar plating?
  manual_review: false
  review_reason: ''
- procedure_id: proximal_humerus_fracture_orif
  display_name: Proximal Humerus Fracture ORIF
  specialty: trauma
  region: shoulder
  orthobullets_urls:
  - https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
  - https://www.orthobullets.com/approaches/12061/shoulder-anterior-deltopectoral-approach
  - https://www.orthobullets.com/trauma/1018/proximal-humerus-fractures
  recommended_approach_ids:
  - approach_shoulder_deltopectoral
  - approach_shoulder_lateral_deltoid_split
  conditional_approach_ids: []
  blocked_approach_ids: []
  important_anatomy:
  - text: 'Proximal humerus: anatomic neck (old epiphyseal plate), surgical neck (weakened
      area). Four segments per Neer: greater tuberosity, lesser tuberosity, articular
      surface, shaft. Considered separate part if >1cm displacement or 45° angulation.'
    source_url: https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
    source_section: Anatomy > Osteology / Classification (Neer)
    confidence: high
  - text: 'Deforming forces: pectoralis major displaces shaft anteriorly and medially;
      deltoid displaces proximal fragment laterally; supraspinatus/infraspinatus/teres
      minor externally rotate greater tuberosity; subscapularis internally rotates
      articular segment or lesser tuberosity.'
    source_url: https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
    source_section: Anatomy > Muscles
    confidence: high
  - text: 'Blood supply: anterior humeral circumflex artery (anterolateral ascending
      branch, arcuate artery terminal and main supply to greater tuberosity); posterior
      humeral circumflex artery (recent studies suggest main blood supply to humeral
      head).'
    source_url: https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
    source_section: Anatomy > Blood Supply
    confidence: high
  structures_at_risk:
  - structure: Axillary nerve
    why_it_matters: At risk with release of subscapularis tendon (runs distal and
      medial) or incision of teres major/latissimus (proximal). Also at risk with
      lateral pins in CRPP.
    source_url: https://www.orthobullets.com/approaches/12061/shoulder-anterior-deltopectoral-approach
    source_section: Dangers
    confidence: high
  - structure: Musculocutaneous nerve
    why_it_matters: Enters medial side of biceps 5-8 cm distal to coracoid; neurapraxia
      risk with vigorous retraction (stay lateral).
    source_url: https://www.orthobullets.com/approaches/12061/shoulder-anterior-deltopectoral-approach
    source_section: Dangers
    confidence: high
  - structure: Cephalic vein
    why_it_matters: In deltopectoral interval; preserve if possible as landmark for
      revision cases; can ligate if injured.
    source_url: https://www.orthobullets.com/approaches/12061/shoulder-anterior-deltopectoral-approach
    source_section: Dangers
    confidence: high
  landmarks:
  - landmark: Deltopectoral interval / cephalic vein
    why_it_matters: Key for anterior approach to shoulder and proximal humerus; between
      deltoid and pectoralis major.
    source_url: https://www.orthobullets.com/approaches/12061/shoulder-anterior-deltopectoral-approach
    source_section: Approach
    confidence: high
  - landmark: Greater and lesser tuberosities, surgical neck
    why_it_matters: Palpable landmarks for reduction and plate positioning in ORIF;
      Neer segments.
    source_url: https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
    source_section: Anatomy / Classification
    confidence: high
  approach_notes:
  - text: 'Deltopectoral (anterior): standard for many 3/4-part and arthroplasty.
      Interval between deltoid (axillary n.) and pectoralis major (medial/lateral
      pectoral n.). Cephalic vein in interval. Release subscapularis for exposure
      (protect axillary n. distally/medially). Can extend distally to humerus.'
    source_url: https://www.orthobullets.com/approaches/12061/shoulder-anterior-deltopectoral-approach
    source_section: Approach / Indications
    confidence: high
  - text: 'Lateral deltoid split: for proximal humerus ORIF and rotator cuff. Limit
      split to protect axillary nerve (3-5cm below acromion).'
    source_url: https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
    source_section: Treatment / ORIF (cross ref approaches)
    confidence: high
  pimp_topics:
  - Key approach for this case per OB and map?
  - Primary structure at risk?
  - Describe the Neer classification segments and displacement criteria for proximal
    humerus fractures.
  - What are the deforming forces on the proximal humerus fragments and which muscles
    cause them?
  - What is the primary blood supply to the humeral head and greater tuberosity? Why
    does it matter for ORIF vs arthroplasty?
  - Key dangers and landmarks in the deltopectoral approach for proximal humerus ORIF.
  manual_review: false
  review_reason: ''
  playbook_update:
    version: v2
    reason: top100_expansion
    source: orthobullets_only
    fields_changed:
    - landmarks
    - approach_notes
    - important_anatomy
    - orthobullets_urls
    - structures_at_risk
    - pimp_topics
    evidence_urls:
    - https://www.orthobullets.com/trauma/1015/proximal-humerus-fractures
