- procedure_id: bimalleolar_ankle_orif
  display_name: Bimalleolar Ankle ORIF
  specialty: trauma
  region: ankle
  orthobullets_urls:
  - https://www.orthobullets.com/trauma/1047/ankle-fractures
  recommended_approach_ids: []
  conditional_approach_ids:
  - condition: posterior malleolus mentioned or trimalleolar pattern
    triggers:
    - posterior malleolus
    - posterior fragment
    - trimalleolar
    - posterior mal
    approach_ids:
    - approach_lower_ext_ankle_posteromedial
  blocked_approach_ids:
  - approach_lower_ext_ankle_anterior
  important_anatomy: []
  structures_at_risk: []
  landmarks: []
  approach_notes:
  - text: 'Per map evidence: OB describes specific approaches (e.g. lateral for bimalleolar)
      but catalog gaps prevent full recommended IDs. No free-form guessing; limited
      to available (e.g. posteromedial for some ankle variants).'
    source_url: https://www.orthobullets.com/trauma/1047/ankle-fractures
    source_section: evidence_note from map
    confidence: low
  pimp_topics:
  - Key approach for this case per OB and map?
  - Primary structure at risk?
  manual_review: true
  review_reason: OB (trauma/1047) specifies direct lateral approach to fibula + direct
    medial approach to ankle for bimalleolar; also lists dedicated posterolateral
    and posteromedial for variants with posterior involvement. Dedicated 'Approach
    to the Lateral Malleolus' page exists. Catalog has no lateral fibula or dedicated
    medial malleolus ID (only anterior + posteromedial ankle). Anterior ankle explicitly
    for joint/talus access, not routine bimalleolar. Map therefore leaves recommended
    empty + blocks anterior; manual_review required until catalog expanded.
