    source_section: Introduction / Standard Medial Parapatellar Approach
    confidence: high
  structures_at_risk:
  - structure: Superior lateral genicular artery
    why_it_matters: At risk during lateral retinacular release; may be the last remaining
      blood supply to the patella after medial parapatellar approach and fat pad excision.
    source_url: https://www.orthobullets.com/approaches/12028/knee-medial-parapatellar-approach
    source_section: Dangers
